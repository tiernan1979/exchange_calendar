create_event:
  name: Create Calendar Event
  description: Creates a new event in the Exchange calendar.
  fields:
    subject:
      name: Subject
      description: The subject of the event.
      example: "Team Meeting"
      required: true
      selector:
        text:
    date_start:
      name: Start Time
      description: The start time of the event in ISO format.
      example: "2025-05-13 10:00:00"
      required: true
      selector:
        datetime: {}
    date_end:
      name: End Time
      description: The end time of the event in ISO format.
      example: "2025-05-13 11:00:00"
      required: true
      selector:
        datetime: {}
    location:
      name: Location
      description: The location of the event.
      example: "Conference Room"
      selector:
        text:
    body:
      name: Body
      description: The body or description of the event.
      example: "Discuss project updates."
      selector:
        text:

delete_event:
  name: Delete Calendar Event
  description: Deletes an event from the Exchange calendar by ID.
  fields:
    event_id:
      name: Event ID
      description: The unique ID of the event to delete.
      example: "AAMkAGI2..."
      required: true
      selector:
        text:

search_event:
  name: Search Calendar Events
  description: Searches for events in the Exchange calendar within a date range.
  fields:
    date_start:
      name: Start Time
      description: The start time of the search range in ISO format.
      example: "2025-05-13 00:00:00"
      required: true
      selector:
        datetime: {}
    date_end:
      name: End Time
      description: The end time of the search range in ISO format.
      example: "2025-05-14 00:00:00"
      required: true
      selector:
        datetime: {}

edit_event:
  name: Edit Calendar Event
  description: >
    Finds an existing Exchange calendar event by subject and updates the fields
    you provide. Only supplied fields are changed — omit any field to leave it
    as-is. If multiple events match the subject, the call will fail and you
    should provide a more specific subject.
  fields:
    subject:
      name: Subject (search)
      description: >
        The subject of the event to find. A case-insensitive partial match is
        used, so "Freo vs Melbourne" will match "AFL - Home - Freo vs Melbourne
        - Round 2".
      example: "Freo vs Melbourne"
      required: true
      selector:
        text:
    new_subject:
      name: New Subject
      description: Replace the event subject with this value.
      example: "AFL - Home - Freo vs Melbourne - Round 2 (Updated)"
      selector:
        text:
    new_date_start:
      name: New Start Time
      description: Replace the event start time.
      example: "2026-03-21 14:00:00"
      selector:
        datetime: {}
    new_date_end:
      name: New End Time
      description: Replace the event end time.
      example: "2026-03-21 16:30:00"
      selector:
        datetime: {}
    new_location:
      name: New Location
      description: Replace the event location.
      example: "Optus Stadium Perth"
      selector:
        text:
    new_body:
      name: New Body
      description: Replace the event body/description.
      example: "Updated details for this event."
      selector:
        text:
    search_start:
      name: Search Window Start
      description: >
        Start of the date range to search for the event. Defaults to 1 year
        before today if not provided.
      example: "2026-01-01 00:00:00"
      selector:
        datetime: {}
    search_end:
      name: Search Window End
      description: >
        End of the date range to search for the event. Defaults to 1 year
        after today if not provided.
      example: "2026-12-31 23:59:59"
      selector:
        datetime: {}
